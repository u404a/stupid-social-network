<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простая соцсеть / Менеджер постов</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f5f7fa;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .app {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 24px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 20px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        h1 span {
            background: #e9eef4;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 400;
            color: #475569;
        }
        .login-section, .post-section, .feed-section {
            margin-bottom: 24px;
        }
        .login-box, .post-box {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e2e8f0;
        }
        .login-box h2, .post-box h2, .feed-section h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 16px;
            font-weight: 500;
            color: #334155;
        }
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }
        .input-group input:focus {
            border-color: #3b82f6;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid transparent;
        }
        button:hover {
            background: #2563eb;
        }
        button.secondary {
            background: white;
            color: #1e293b;
            border-color: #cbd5e1;
        }
        button.secondary:hover {
            background: #f1f5f9;
        }
        .user-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f1f4f9;
            border-radius: 40px;
            padding: 6px 6px 6px 20px;
            margin-bottom: 20px;
        }
        .user-info p {
            margin: 0;
            font-weight: 500;
            color: #0f172a;
        }
        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .post-item {
            background: #ffffff;
            border: 1px solid #e9eef2;
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .post-author {
            font-weight: 600;
            color: #0f172a;
            background: #e9eef4;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 14px;
        }
        .post-date {
            color: #64748b;
            font-size: 13px;
        }
        .post-content {
            font-size: 16px;
            line-height: 1.5;
            color: #1e293b;
            margin: 8px 0 0 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .empty-feed {
            text-align: center;
            color: #94a3b8;
            padding: 32px 16px;
            background: #f8fafc;
            border-radius: 24px;
            font-style: italic;
        }
        hr {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 24px 0;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <h1>📱 Микросеть <span>менеджер постов</span></h1>

    <!-- Блок входа / профиль -->
    <div id="loginBlock" class="login-section">
        <div class="login-box">
            <h2>🔑 Вход</h2>
            <div class="input-group">
                <input type="text" id="usernameInput" placeholder="Ваше имя (ник)" value="">
                <button id="loginBtn">Войти</button>
            </div>
        </div>
    </div>

    <!-- Блок создания поста (скрыт, пока не вошли) -->
    <div id="postBlock" class="post-section" style="display: none;">
        <div class="user-info" id="userInfo">
            <p id="currentUserLabel"></p>
            <button class="secondary" id="logoutBtn">Выйти</button>
        </div>
        <div class="post-box">
            <h2>✍️ Новый пост</h2>
            <div class="input-group">
                <input type="text" id="postInput" placeholder="Что у вас нового?" maxlength="300">
                <button id="postBtn">Опубликовать</button>
            </div>
        </div>
    </div>

    <!-- Лента постов -->
    <div class="feed-section">
        <h2>📰 Лента</h2>
        <ul class="post-list" id="feedList">
            <li class="empty-feed">Пока нет постов. Напишите первый!</li>
        </ul>
    </div>
</div>

<script>
    (function() {
        // ----- Ключи для localStorage -----
        const STORAGE_POSTS_KEY = 'simple_social_posts';
        const STORAGE_USER_KEY = 'simple_social_current_user';

        // ----- Элементы DOM -----
        const loginBlock = document.getElementById('loginBlock');
        const postBlock = document.getElementById('postBlock');
        const usernameInput = document.getElementById('usernameInput');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const currentUserLabel = document.getElementById('currentUserLabel');
        const postInput = document.getElementById('postInput');
        const postBtn = document.getElementById('postBtn');
        const feedList = document.getElementById('feedList');

        // ----- Текущий пользователь (из session, не храним в localStorage постоянно) -----
        let currentUser = null;

        // ----- Загрузка начальных данных -----
        function loadInitialUser() {
            const saved = localStorage.getItem(STORAGE_USER_KEY);
            if (saved) {
                currentUser = saved;
                updateUIBasedOnUser();
            }
        }

        // ----- Сохранение/чтение постов -----
        function getPosts() {
            const postsJson = localStorage.getItem(STORAGE_POSTS_KEY);
            if (postsJson) {
                try {
                    return JSON.parse(postsJson);
                } catch (e) {
                    return [];
                }
            }
            return [];
        }

        function savePosts(posts) {
            localStorage.setItem(STORAGE_POSTS_KEY, JSON.stringify(posts));
        }

        // ----- Добавление поста -----
        function addPost(author, content) {
            if (!author || !content.trim()) return;

            const posts = getPosts();
            const newPost = {
                id: Date.now() + '-' + Math.random().toString(36).substr(2, 6),
                author: author,
                content: content.trim(),
                timestamp: new Date().toISOString()
            };
            posts.unshift(newPost); // новый пост сверху
            savePosts(posts);
            renderFeed();
        }

        // ----- Форматирование даты (коротко) -----
        function formatDate(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'только что';
            if (diffMins < 60) return diffMins + ' мин. назад';
            if (diffHours < 24) return diffHours + ' ч. назад';
            if (diffDays === 1) return 'вчера';
            if (diffDays < 7) return diffDays + ' дн. назад';
            return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        }

        // ----- Отрисовка ленты -----
        function renderFeed() {
            const posts = getPosts();
            if (posts.length === 0) {
                feedList.innerHTML = '<li class="empty-feed">Пока нет постов. Напишите первый!</li>';
                return;
            }

            let html = '';
            posts.forEach(post => {
                html += `
                    <li class="post-item">
                        <div class="post-header">
                            <span class="post-author">${escapeHtml(post.author)}</span>
                            <span class="post-date">${formatDate(post.timestamp)}</span>
                        </div>
                        <p class="post-content">${escapeHtml(post.content)}</p>
                    </li>
                `;
            });
            feedList.innerHTML = html;
        }

        // Простейший escape для безопасности
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ----- Обновление интерфейса в зависимости от авторизации -----
        function updateUIBasedOnUser() {
            if (currentUser) {
                // Пользователь залогинен
                loginBlock.style.display = 'none';
                postBlock.style.display = 'block';
                currentUserLabel.textContent = `👋 ${escapeHtml(currentUser)}`;
                // Очищаем поле ввода имени (на всякий случай)
                usernameInput.value = '';
            } else {
                loginBlock.style.display = 'block';
                postBlock.style.display = 'none';
                // Очищаем поле ввода поста
                postInput.value = '';
            }
        }

        // ----- Обработчики -----
        loginBtn.addEventListener('click', () => {
            const name = usernameInput.value.trim();
            if (name === '') {
                alert('Введите имя');
                return;
            }
            currentUser = name;
            localStorage.setItem(STORAGE_USER_KEY, currentUser);
            updateUIBasedOnUser();
            renderFeed(); // на всякий случай
        });

        logoutBtn.addEventListener('click', () => {
            currentUser = null;
            localStorage.removeItem(STORAGE_USER_KEY);
            updateUIBasedOnUser();
            renderFeed();
        });

        postBtn.addEventListener('click', () => {
            if (!currentUser) {
                alert('Сначала войдите');
                return;
            }
            const content = postInput.value.trim();
            if (content === '') {
                alert('Напишите что-нибудь');
                return;
            }
            addPost(currentUser, content);
            postInput.value = ''; // очистить поле
        });

        // Дополнительно: разрешить Enter в поле поста
        postInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                postBtn.click();
            }
        });

        // Инициация: пробуем загрузить сессию, рендерим ленту
        loadInitialUser();
        renderFeed();
    })();
</script>
</body>
</html>
