<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простая соцсеть / Менеджер постов</title>
    <!-- Подключаем Firebase (версия 8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f5f7fa;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .app {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 24px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 20px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        h1 span {
            background: #e9eef4;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 400;
            color: #475569;
        }
        .login-section, .post-section, .feed-section {
            margin-bottom: 24px;
        }
        .login-box, .post-box {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e2e8f0;
        }
        .login-box h2, .post-box h2, .feed-section h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 16px;
            font-weight: 500;
            color: #334155;
        }
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }
        .input-group input:focus {
            border-color: #3b82f6;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid transparent;
        }
        button:hover {
            background: #2563eb;
        }
        button.secondary {
            background: white;
            color: #1e293b;
            border-color: #cbd5e1;
        }
        button.secondary:hover {
            background: #f1f5f9;
        }
        .user-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f1f4f9;
            border-radius: 40px;
            padding: 6px 6px 6px 20px;
            margin-bottom: 20px;
        }
        .user-info p {
            margin: 0;
            font-weight: 500;
            color: #0f172a;
        }
        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .post-item {
            background: #ffffff;
            border: 1px solid #e9eef2;
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .post-author {
            font-weight: 600;
            color: #0f172a;
            background: #e9eef4;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 14px;
        }
        .post-date {
            color: #64748b;
            font-size: 13px;
        }
        .post-content {
            font-size: 16px;
            line-height: 1.5;
            color: #1e293b;
            margin: 8px 0 0 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .empty-feed {
            text-align: center;
            color: #94a3b8;
            padding: 32px 16px;
            background: #f8fafc;
            border-radius: 24px;
            font-style: italic;
        }
        hr {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 24px 0;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <h1>📱 Микросеть <span>облачная</span></h1>

    <!-- Блок входа / профиль -->
    <div id="loginBlock" class="login-section">
        <div class="login-box">
            <h2>🔑 Вход</h2>
            <div class="input-group">
                <input type="text" id="usernameInput" placeholder="Ваше имя (ник)" value="">
                <button id="loginBtn">Войти</button>
            </div>
        </div>
    </div>

    <!-- Блок создания поста (скрыт, пока не вошли) -->
    <div id="postBlock" class="post-section" style="display: none;">
        <div class="user-info" id="userInfo">
            <p id="currentUserLabel"></p>
            <button class="secondary" id="logoutBtn">Выйти</button>
        </div>
        <div class="post-box">
            <h2>✍️ Новый пост</h2>
            <div class="input-group">
                <input type="text" id="postInput" placeholder="Что у вас нового?" maxlength="300">
                <button id="postBtn">Опубликовать</button>
            </div>
        </div>
    </div>

    <!-- Лента постов -->
    <div class="feed-section">
        <h2>📰 Лента</h2>
        <ul class="post-list" id="feedList">
            <li class="empty-feed">Загрузка...</li>
        </ul>
    </div>
</div>

<script>
    // 🔥 ВАША КОНФИГУРАЦИЯ FIREBASE (с добавленным databaseURL)
    const firebaseConfig = {
  apiKey: "AIzaSyAtA--ryA4SXNwdor2YB-r24glNsJbzXf4",
  authDomain: "stupid-social-network.firebaseapp.com",
  databaseURL: "https://stupid-social-network-default-rtdb.firebaseio.com",
  projectId: "stupid-social-network",
  storageBucket: "stupid-social-network.firebasestorage.app",
  messagingSenderId: "824229398982",
  appId: "1:824229398982:web:b57bdf644675c7127c0ac7",
  measurementId: "G-P1JDK2XP7V"
    };

    // Инициализация Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const postsRef = database.ref('posts'); // ссылка на узел 'posts' в базе

    // ----- Элементы DOM -----
    const loginBlock = document.getElementById('loginBlock');
    const postBlock = document.getElementById('postBlock');
    const usernameInput = document.getElementById('usernameInput');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const currentUserLabel = document.getElementById('currentUserLabel');
    const postInput = document.getElementById('postInput');
    const postBtn = document.getElementById('postBtn');
    const feedList = document.getElementById('feedList');

    // Текущий пользователь (сохраняем в localStorage только имя для удобства)
    let currentUser = localStorage.getItem('simple_social_current_user') || null;

    // ----- Обновление интерфейса по пользователю -----
    function updateUIBasedOnUser() {
        if (currentUser) {
            loginBlock.style.display = 'none';
            postBlock.style.display = 'block';
            currentUserLabel.textContent = `👋 ${escapeHtml(currentUser)}`;
            usernameInput.value = '';
        } else {
            loginBlock.style.display = 'block';
            postBlock.style.display = 'none';
            postInput.value = '';
        }
    }

    // ----- Загрузка постов из Firebase (реальное время) -----
    function loadPosts() {
        postsRef.orderByChild('timestamp').on('value', (snapshot) => {
            const postsData = snapshot.val();
            const posts = [];
            if (postsData) {
                // Преобразуем объект Firebase в массив, сортируем по времени (новые сверху)
                Object.keys(postsData).forEach(key => {
                    posts.push({ id: key, ...postsData[key] });
                });
                posts.sort((a, b) => b.timestamp - a.timestamp); // новые сверху (по убыванию timestamp)
            }
            renderFeed(posts);
        });
    }

    // ----- Отрисовка ленты -----
    function renderFeed(posts) {
        if (!posts || posts.length === 0) {
            feedList.innerHTML = '<li class="empty-feed">Пока нет постов. Напишите первый!</li>';
            return;
        }

        let html = '';
        posts.forEach(post => {
            html += `
                <li class="post-item">
                    <div class="post-header">
                        <span class="post-author">${escapeHtml(post.author)}</span>
                        <span class="post-date">${formatDate(post.timestamp)}</span>
                    </div>
                    <p class="post-content">${escapeHtml(post.content)}</p>
                </li>
            `;
        });
        feedList.innerHTML = html;
    }

    // ----- Добавление поста в Firebase -----
    function addPost(author, content) {
        if (!author || !content.trim()) return;

        const newPost = {
            author: author,
            content: content.trim(),
            timestamp: Date.now() // используем миллисекунды для сортировки
        };
        // Сохраняем в Firebase (push генерирует уникальный ключ)
        postsRef.push(newPost);
    }

    // ----- Форматирование даты (коротко) -----
    function formatDate(timestamp) {
        const date = new Date(timestamp);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);

        if (diffMins < 1) return 'только что';
        if (diffMins < 60) return diffMins + ' мин. назад';
        if (diffHours < 24) return diffHours + ' ч. назад';
        if (diffDays === 1) return 'вчера';
        if (diffDays < 7) return diffDays + ' дн. назад';
        return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
    }

    // Простейший escape для безопасности
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ----- Обработчики -----
    loginBtn.addEventListener('click', () => {
        const name = usernameInput.value.trim();
        if (name === '') {
            alert('Введите имя');
            return;
        }
        currentUser = name;
        localStorage.setItem('simple_social_current_user', currentUser);
        updateUIBasedOnUser();
    });

    logoutBtn.addEventListener('click', () => {
        currentUser = null;
        localStorage.removeItem('simple_social_current_user');
        updateUIBasedOnUser();
    });

    postBtn.addEventListener('click', () => {
        if (!currentUser) {
            alert('Сначала войдите');
            return;
        }
        const content = postInput.value.trim();
        if (content === '') {
            alert('Напишите что-нибудь');
            return;
        }
        addPost(currentUser, content);
        postInput.value = ''; // очистить поле
    });

    postInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            postBtn.click();
        }
    });

    // Инициализация
    updateUIBasedOnUser();
    loadPosts(); // начинаем слушать изменения в Firebase
</script>
</body>
</html>
